<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F5EFE3"/>
      <stop offset="100%" stop-color="#ECE3D1"/>
    </linearGradient>
    <linearGradient id="og-coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D25A35"/>
      <stop offset="100%" stop-color="#942A18"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="85%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#D25A35" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#D25A35" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- subtle grid -->
  <g stroke="#1C1814" stroke-opacity="0.04">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- mark -->
  <g transform="translate(90,130)">
    <rect width="96" height="96" rx="24" fill="#1C1814"/>
    <path d="M28 76 V36 Q28 28 36 28 H58 Q72 28 72 42 Q72 54 60 56 L76 76"
          fill="none" stroke="url(#og-coral)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="76" cy="30" r="4.5" fill="url(#og-coral)"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="260" font-family="JetBrains Mono, monospace" font-size="20"
        fill="#8A7E6A" letter-spacing="4">THE CALM RESTAURANT OS</text>

  <!-- headline -->
  <text x="90" y="360" font-family="Fraunces, Georgia, serif" font-size="110"
        fill="#1C1814" letter-spacing="-4" font-weight="500">Taste, served</text>
  <text x="90" y="475" font-family="Fraunces, Georgia, serif" font-size="110"
        font-style="italic" font-weight="400" fill="url(#og-coral)" letter-spacing="-4">with intention.</text>

  <!-- subtitle -->
  <text x="90" y="540" font-family="Inter, sans-serif" font-size="26" fill="#4F4538">
    Menus, QR ordering, kitchen flow, and analytics — as one tool.
  </text>

  <!-- chip -->
  <g transform="translate(90,570)">
    <rect width="230" height="44" rx="22" fill="#1C1814"/>
    <text x="115" y="29" text-anchor="middle" font-family="Inter, sans-serif"
          font-size="15" fill="#F5EFE3" font-weight="600" letter-spacing="0.5">
      Start a free workspace →
    </text>
  </g>
</svg>
