<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="RestauHub logo">
  <defs>
    <linearGradient id="rhg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="#0f0f14"/>
  <!-- Outer hexagonal frame -->
  <polygon points="60,16 96,38 96,82 60,104 24,82 24,38"
           fill="none" stroke="url(#rhg)" stroke-width="2.2" stroke-linejoin="round" opacity="0.55"/>
  <!-- Bowl silhouette -->
  <path d="M34 62 Q60 90 86 62"
        fill="none" stroke="url(#rhg)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Steam dots -->
  <circle cx="48" cy="44" r="2.8" fill="url(#rhg)"/>
  <circle cx="60" cy="38" r="3.4" fill="url(#rhg)"/>
  <circle cx="72" cy="44" r="2.8" fill="url(#rhg)"/>
  <!-- Fork tines as QR corner -->
  <rect x="78" y="70" width="4" height="12" rx="1" fill="#818cf8"/>
  <rect x="38" y="70" width="4" height="12" rx="1" fill="#818cf8"/>
</svg>
